services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: symptom_tracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: symptom_tracker
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: dev-secret-change-in-production
      PORT: 3000
    volumes:
      - ./backend/src:/app/src
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"

  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    command: ["node", "src/migrations/run.js"]
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: symptom_tracker
      DB_USER: postgres
      DB_PASSWORD: postgres
    volumes:
      - ./backend/src:/app/src
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    environment:
      VITE_API_URL: http://backend:3000
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.js:/app/vite.config.js
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  pgdata_dev:
